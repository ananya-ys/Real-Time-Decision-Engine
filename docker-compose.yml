# RTDE — Docker Compose for local development (WSL / Linux / Mac)
# Usage: docker compose up --build
# Frontend: open index.html in browser (or python -m http.server 3000)
# Backend:  http://localhost:8000
# API Docs: http://localhost:8000/docs

services:

  # ── PostgreSQL 16 ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: rtde_postgres
    environment:
      POSTGRES_USER: rtde_user
      POSTGRES_PASSWORD: rtde_pass
      POSTGRES_DB: rtde_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rtde_user -d rtde_db"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ── Redis 7 ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rtde_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  # ── Migrate (runs once, exits) ─────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rtde_migrate
    working_dir: /app
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://rtde_user:rtde_pass@postgres:5432/rtde_db
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
   
  # ── FastAPI Application ────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rtde_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://rtde_user:rtde_pass@postgres:5432/rtde_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      APP_ENV: development
      LOG_LEVEL: INFO
      SECRET_KEY: local-dev-secret-change-in-prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Celery Worker (optional — async ML training) ───────────────
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rtde_worker
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://rtde_user:rtde_pass@postgres:5432/rtde_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      APP_ENV: development
      SECRET_KEY: local-dev-secret-change-in-prod  # must match app service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
